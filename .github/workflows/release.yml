name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "22"

jobs:
  # Build Go CLI binaries for macOS (aarch64 + x86_64)
  build-cli:
    needs: [test-go]
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goarch: arm64
            artifact: devrecall-darwin-aarch64
            clang_arch: arm64
          - goarch: amd64
            artifact: devrecall-darwin-x86_64
            clang_arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build CLI
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: "clang -arch ${{ matrix.clang_arch }}"
          CGO_CFLAGS: "-arch ${{ matrix.clang_arch }}"
          CGO_LDFLAGS: "-arch ${{ matrix.clang_arch }}"
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go build -tags "fts5 GO" \
            -ldflags "-X main.version=${VERSION}" \
            -o ${{ matrix.artifact }} \
            ./cmd/devrecall

      - name: Create tarball
        run: |
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # Build Go CLI binaries for Linux (x86_64 + aarch64) and .deb packages
  build-cli-linux:
    needs: [test-go]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            nfpm_arch: amd64
            tarball_suffix: x86_64
            cc: gcc
            apt_packages: ""
          - goarch: arm64
            nfpm_arch: arm64
            tarball_suffix: aarch64
            cc: aarch64-linux-gnu-gcc
            apt_packages: gcc-aarch64-linux-gnu libc6-dev-arm64-cross
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install cross-compilation toolchain
        if: matrix.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Install nfpm
        run: |
          curl -sSL -o /tmp/nfpm.tar.gz https://github.com/goreleaser/nfpm/releases/download/v2.41.3/nfpm_2.41.3_Linux_x86_64.tar.gz
          sudo tar -C /usr/local/bin -xzf /tmp/nfpm.tar.gz nfpm

      - name: Build CLI
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p bin
          go build -tags "fts5 GO" \
            -ldflags "-X main.version=${VERSION}" \
            -o bin/devrecall-linux-${{ matrix.nfpm_arch }} \
            ./cmd/devrecall

      - name: Create tarball
        run: |
          cp bin/devrecall-linux-${{ matrix.nfpm_arch }} devrecall-linux-${{ matrix.tarball_suffix }}
          tar czf devrecall-linux-${{ matrix.tarball_suffix }}.tar.gz devrecall-linux-${{ matrix.tarball_suffix }}

      - name: Build .deb package
        env:
          NFPM_ARCH: ${{ matrix.nfpm_arch }}
        run: |
          export NFPM_VERSION=${GITHUB_REF_NAME#v}
          nfpm package --config packaging/nfpm.yaml --packager deb --target devrecall_${NFPM_VERSION}_${{ matrix.nfpm_arch }}.deb

      - uses: actions/upload-artifact@v4
        with:
          name: devrecall-linux-${{ matrix.tarball_suffix }}
          path: |
            devrecall-linux-${{ matrix.tarball_suffix }}.tar.gz
            devrecall_*_${{ matrix.nfpm_arch }}.deb

  # Run Go tests
  test-go:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: make test

  # Run Rust tests for the desktop app
  test-rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend deps
        working-directory: desktop
        run: pnpm install

      - name: Build frontend (needed for Tauri)
        working-directory: desktop
        run: pnpm build

      - name: Run Rust tests
        working-directory: desktop/src-tauri
        run: cargo test

  # Run frontend tests
  test-frontend:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install deps and test
        working-directory: desktop
        run: |
          pnpm install
          pnpm test

  # Build Tauri desktop app for macOS
  build-desktop:
    needs: [test-go, test-rust, test-frontend]
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install frontend deps
        working-directory: desktop
        run: pnpm install

      - name: Build Tauri app
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: DevRecall-${{ matrix.arch }}.dmg
          path: desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  # Create GitHub Release with all artifacts
  release:
    needs: [build-cli, build-cli-linux, build-desktop]
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.dmg" -o -name "*.deb" \) -exec sha256sum {} \; > checksums.sha256
          cat checksums.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/checksums.sha256

      # Pushes the new version + tarball SHAs into pavelpilyak/homebrew-devrecall.
      # Cask (DMG) is left for manual bump until Tauri DMG naming is pinned.
      # Requires repo secret HOMEBREW_TAP_TOKEN (PAT with `repo` scope on the tap).
      - name: Bump Homebrew tap (CLI formula)
        if: env.HOMEBREW_TAP_TOKEN != ''
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sha_darwin_arm=$(sha256sum artifacts/devrecall-darwin-aarch64/devrecall-darwin-aarch64.tar.gz | awk '{print $1}')
          sha_darwin_x86=$(sha256sum artifacts/devrecall-darwin-x86_64/devrecall-darwin-x86_64.tar.gz | awk '{print $1}')
          sha_linux_arm=$(sha256sum artifacts/devrecall-linux-aarch64/devrecall-linux-aarch64.tar.gz | awk '{print $1}')
          sha_linux_x86=$(sha256sum artifacts/devrecall-linux-x86_64/devrecall-linux-x86_64.tar.gz | awk '{print $1}')

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/pavelpilyak/homebrew-devrecall.git" tap
          cd tap

          # Each url block is `url "..."` followed by `sha256 "..."`.
          # Match the url line, advance to next line, replace the sha256 value.
          sed -i \
            -e "s/^  version \".*\"/  version \"${VERSION}\"/" \
            -e "/devrecall-darwin-aarch64.tar.gz/{n;s/sha256 \".*\"/sha256 \"${sha_darwin_arm}\"/;}" \
            -e "/devrecall-darwin-x86_64.tar.gz/{n;s/sha256 \".*\"/sha256 \"${sha_darwin_x86}\"/;}" \
            -e "/devrecall-linux-aarch64.tar.gz/{n;s/sha256 \".*\"/sha256 \"${sha_linux_arm}\"/;}" \
            -e "/devrecall-linux-x86_64.tar.gz/{n;s/sha256 \".*\"/sha256 \"${sha_linux_x86}\"/;}" \
            Formula/devrecall-cli.rb

          git config user.name "devrecall-bot"
          git config user.email "devrecall-bot@users.noreply.github.com"
          git add Formula/devrecall-cli.rb
          if git diff --cached --quiet; then
            echo "Tap formula already up to date"
          else
            git commit -m "devrecall-cli ${VERSION}"
            git push
          fi

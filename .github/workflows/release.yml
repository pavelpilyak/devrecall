name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "22"

jobs:
  # Build Go CLI binaries for macOS (aarch64 + x86_64)
  build-cli:
    needs: [test-go]
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goarch: arm64
            artifact: devrecall-darwin-aarch64
            clang_arch: arm64
          - goarch: amd64
            artifact: devrecall-darwin-x86_64
            clang_arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build CLI
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: "clang -arch ${{ matrix.clang_arch }}"
          CGO_CFLAGS: "-arch ${{ matrix.clang_arch }}"
          CGO_LDFLAGS: "-arch ${{ matrix.clang_arch }}"
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go build -tags "fts5 GO" \
            -ldflags "-X main.version=${VERSION}" \
            -o ${{ matrix.artifact }} \
            ./cmd/devrecall

      - name: Create tarball
        run: |
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # Build Go CLI binaries for Linux (x86_64 + aarch64) as plain tarballs.
  build-cli-linux:
    needs: [test-go]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            tarball_suffix: x86_64
            cc: gcc
            apt_packages: ""
          - goarch: arm64
            tarball_suffix: aarch64
            cc: aarch64-linux-gnu-gcc
            apt_packages: gcc-aarch64-linux-gnu libc6-dev-arm64-cross
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install cross-compilation toolchain
        if: matrix.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Build CLI
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go build -tags "fts5 GO" \
            -ldflags "-X main.version=${VERSION}" \
            -o devrecall-linux-${{ matrix.tarball_suffix }} \
            ./cmd/devrecall

      - name: Create tarball
        run: tar czf devrecall-linux-${{ matrix.tarball_suffix }}.tar.gz devrecall-linux-${{ matrix.tarball_suffix }}

      - uses: actions/upload-artifact@v4
        with:
          name: devrecall-linux-${{ matrix.tarball_suffix }}
          path: devrecall-linux-${{ matrix.tarball_suffix }}.tar.gz

  # Run Go tests
  test-go:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: make test

  # Run Rust tests for the desktop app
  test-rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend deps
        working-directory: desktop
        run: pnpm install

      - name: Build frontend (needed for Tauri)
        working-directory: desktop
        run: pnpm build

      - name: Run Rust tests
        working-directory: desktop/src-tauri
        run: cargo test

  # Run frontend tests
  test-frontend:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install deps and test
        working-directory: desktop
        run: |
          pnpm install
          pnpm test

  # Build Tauri desktop app for macOS
  build-desktop:
    needs: [test-go, test-rust, test-frontend]
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install frontend deps
        working-directory: desktop
        run: pnpm install

      # Unsigned DMG. tauri.conf.json sets signingIdentity: null, so Apple
      # codesign vars are unused. The Tauri update keypair is optional —
      # the build succeeds without it; the auto-updater just won't validate
      # signatures at runtime. Add TAURI_SIGNING_PRIVATE_KEY[_PASSWORD] as
      # repo secrets later to enable signed updates.
      - name: Build Tauri app
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }}

      # Tauri produces DevRecall_<version>_<arch>.dmg with arch="aarch64" or "x64".
      # Rename to DevRecall-<arch>.dmg with arch="aarch64" or "x86_64" so the
      # cask URL never has to track Tauri's naming convention or the version.
      - name: Rename DMG to stable filename
        run: |
          cd desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg
          src=$(ls DevRecall_*.dmg | head -1)
          mv "$src" "DevRecall-${{ matrix.arch }}.dmg"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: DevRecall-${{ matrix.arch }}.dmg
          path: desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/DevRecall-${{ matrix.arch }}.dmg

  # Create GitHub Release with all artifacts
  release:
    needs: [build-cli, build-cli-linux, build-desktop]
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.dmg" \) -exec sha256sum {} \; > checksums.sha256
          cat checksums.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.dmg
            artifacts/checksums.sha256

      # Pushes the new version + tarball/DMG SHAs into pavelpilyak/homebrew-devrecall
      # for both the CLI formula and the cask. Requires repo secret HOMEBREW_TAP_TOKEN
      # (PAT with `repo` scope on the tap). If unset, this step skips silently and
      # the tap stays at the previous version — bump it manually.
      - name: Bump Homebrew tap (formula + cask)
        if: env.HOMEBREW_TAP_TOKEN != ''
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sha_darwin_arm=$(sha256sum artifacts/devrecall-darwin-aarch64/devrecall-darwin-aarch64.tar.gz | awk '{print $1}')
          sha_darwin_x86=$(sha256sum artifacts/devrecall-darwin-x86_64/devrecall-darwin-x86_64.tar.gz | awk '{print $1}')
          sha_linux_arm=$(sha256sum artifacts/devrecall-linux-aarch64/devrecall-linux-aarch64.tar.gz | awk '{print $1}')
          sha_linux_x86=$(sha256sum artifacts/devrecall-linux-x86_64/devrecall-linux-x86_64.tar.gz | awk '{print $1}')
          sha_dmg_arm=$(sha256sum artifacts/DevRecall-aarch64.dmg/DevRecall-aarch64.dmg | awk '{print $1}')
          sha_dmg_x86=$(sha256sum artifacts/DevRecall-x86_64.dmg/DevRecall-x86_64.dmg | awk '{print $1}')

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/pavelpilyak/homebrew-devrecall.git" tap
          cd tap

          # In both formula and cask, each block is `url "..."` followed by
          # `sha256 "..."`. Match the url line, advance one line, replace sha.
          sed -i \
            -e "s/^  version \".*\"/  version \"${VERSION}\"/" \
            -e "/devrecall-darwin-aarch64.tar.gz/{n;s/sha256 \".*\"/sha256 \"${sha_darwin_arm}\"/;}" \
            -e "/devrecall-darwin-x86_64.tar.gz/{n;s/sha256 \".*\"/sha256 \"${sha_darwin_x86}\"/;}" \
            -e "/devrecall-linux-aarch64.tar.gz/{n;s/sha256 \".*\"/sha256 \"${sha_linux_arm}\"/;}" \
            -e "/devrecall-linux-x86_64.tar.gz/{n;s/sha256 \".*\"/sha256 \"${sha_linux_x86}\"/;}" \
            Formula/devrecall-cli.rb

          sed -i \
            -e "s/^  version \".*\"/  version \"${VERSION}\"/" \
            -e "/DevRecall-aarch64.dmg/{n;s/sha256 \".*\"/sha256 \"${sha_dmg_arm}\"/;}" \
            -e "/DevRecall-x86_64.dmg/{n;s/sha256 \".*\"/sha256 \"${sha_dmg_x86}\"/;}" \
            Casks/devrecall.rb

          git config user.name "devrecall-bot"
          git config user.email "devrecall-bot@users.noreply.github.com"
          git add Formula/devrecall-cli.rb Casks/devrecall.rb
          if git diff --cached --quiet; then
            echo "Tap already up to date"
          else
            git commit -m "devrecall ${VERSION}"
            git push
          fi

name: devrecall
arch: ${NFPM_ARCH}
platform: linux
version: ${NFPM_VERSION}
version_schema: semver
section: utils
priority: optional
maintainer: Pavel Piliak <pavel@devrecall.dev>
description: |
  On-device developer activity aggregator — generates AI-powered
  standups, perf reviews, and work memory from Git, Slack, Calendar,
  Jira, and Linear. All data stays local.
vendor: DevRecall
homepage: https://devrecall.dev
license: MIT

contents:
  - src: ./bin/devrecall-linux-${NFPM_ARCH}
    dst: /usr/bin/devrecall
    file_info:
      mode: 0755
  - src: ./LICENSE
    dst: /usr/share/doc/devrecall/LICENSE
    file_info:
      mode: 0644
    packager: deb

deb:
  fields:
    Bugs: https://github.com/pavelpilyak/devrecall/issues
  compression: xz

overrides:
  deb:
    depends:
      - libc6
      - ca-certificates
